{% extends 'base.html' %}
{% block title %}Log in &mdash; Egon Blue{% endblock %}
{% block container_extra %} narrow{% endblock %}
{% block content %}

<div class="page-header"><h1>Log in</h1></div>

<form method="post" class="card">
  <div class="form-group">
    <label>Email</label>
    <input type="email" name="email" required>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" name="password" required>
  </div>
  <button class="btn btn-amber" type="submit" style="width:100%;">Log in</button>
</form>
<p style="text-align:center; margin-top:16px; font-size:14px;">No account? <a href="{{ url_for('register') }}" style="color:var(--navy); font-weight:600;">Sign up</a></p>

{% endblock %}
